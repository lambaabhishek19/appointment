name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '12 1 * * *'  # ~3:12 AM German Time
    - cron: '42 1 * * *'  # ~3:42 AM German Time
    - cron: '18 2 * * *'  # ~4:18 AM German Time
    - cron: '48 2 * * *'  # ~4:48 AM German Time
    - cron: '22 3 * * *'  # ~5:22 AM German Time

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers  
        run:  npx playwright install chromium

      - name: Run tests
        run: npm run test
